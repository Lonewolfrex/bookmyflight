services:
  web:
    image: lonewolfrex/bookmyflight:latest
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DEBUG=1
      - DB_HOST=db
      - DB_NAME=flights
      - DB_USER=flightuser
      - DB_PASS=flightpass
    depends_on:
      - db
    networks:
      - webnet
  nginx:
    build: ./nginx
    image: nginx:alpine
    container_name: nginx-api-gateway
    ports:
      - "8080:80"
      - "443:443"                        
    depends_on:
      - web
    networks:
      - webnet
  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=flights
      - POSTGRES_USER=flightuser
      - POSTGRES_PASSWORD=flightpass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - webnet

networks:
  webnet:
    driver: bridge

volumes:
  pgdata:
