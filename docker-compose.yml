services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DEBUG=1
      - DB_HOST=db
      - DB_NAME=flights
      - DB_USER=flightuser
      - DB_PASS=flightpass
    depends_on:
      - db
  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=flights
      - POSTGRES_USER=flightuser
      - POSTGRES_PASSWORD=flightpass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
volumes:
  pgdata:
