```yaml
name: Build and Deploy BookMyFlight

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['python']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif
          path: ${{ runner.temp }}/codeql/sarif/*.sarif

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Create CodeQL HTML Report
        run: |
          echo "Searching for SARIF files..."
          find ${{ runner.temp }} -name "*.sarif" | sed 's/^/  Found: /'

          SARIF=$(find ${{ runner.temp }}/codeql/sarif -name "*.sarif" | head -1)

          if [ ! -f "$SARIF" ]; then
            echo "No SARIF in /codeql/sarif; searching broader..."
            SARIF_ANY=$(find ${{ runner.temp }} -name "*.sarif" | head -1)
            if [ -n "$SARIF_ANY" ]; then
              SARIF="$SARIF_ANY"
              echo "Using: $SARIF"
            fi
          fi

          if [ ! -f "$SARIF" ]; then
            echo "No SARIF file found; using dummy data."
            cat > codeql-report.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>CodeQL SAST Report</title>
          </head>
          <body>
            <h1>CodeQL SAST Report</h1>
            <p>No SARIF file found; see GitHub Security tab for details.</p>
          </body>
          </html>
          EOF
            exit 0
          fi

          RESULTS=$(jq -r '.runs[].results[]' "$SARIF" 2>/dev/null || echo "[]")

          if [ "$RESULTS" = "[]" ]; then
            TOTAL=0
            HIGH=0
            MED=0
            LOW=0
          else
            TOTAL=$(echo "$RESULTS" | jq -s 'length')
            HIGH=$(echo "$RESULTS" | jq -s 'map(select(.level == "error")) | length')
            MED=$(echo "$RESULTS" | jq -s 'map(select(.level == "warning")) | length')
            LOW=$(echo "$RESULTS" | jq -s 'map(select(.level == "note")) | length')
          fi

          cat > codeql-report.html << EOF
          <!DOCTYPE html>
          <html>
          <head>
            <title>CodeQL SAST Report</title>
            <style>
              body { font-family: system-ui, sans-serif; margin: 2em; }
              h1, h2 { color: #2c3e50; }
              .stat { font-weight: bold; color: #e74c3c; }
              .summary { margin: 1em 0; padding: 1em; background: #f9f9f9; border-radius: 0.5em; }
            </style>
          </head>
          <body>
            <h1>CodeQL SAST Report</h1>
            <p><strong>Generated on:</strong> $(date)</p>
            <p><strong>Repository:</strong> ${{ github.repository }}</p>
            <p><strong>Commit:</strong> ${{ github.sha }}</p>

            <div class="summary">
              <h2>Issue Summary</h2>
              <p><span class="stat">Total issues:</span> $TOTAL</p>
              <p><span class="stat">High severity (error):</span> $HIGH</p>
              <p><span class="stat">Medium severity (warning):</span> $MED</p>
              <p><span class="stat">Low severity (note):</span> $LOW</p>
            </div>

            <h2>Details</h2>
            <p>
              Full CodeQL SAST findings are available in GitHub:
              <a href="https://github.com/${{ github.repository }}/security/code-scanning">Security → Code scanning</a>.
            </p>
            <p>
              For automated tooling, download the attached <code>codeql-sarif</code> artifact.
            </p>
          </body>
          </html>
          EOF

      - name: Upload CodeQL HTML Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeql-report-html
          path: codeql-report.html

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: codeql

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/bookmyflight:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/bookmyflight:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/bookmyflight:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/bookmyflight:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/bookmyflight:latest

  deploy:
    name: Deploy to Docker (Laptop1)
    needs: build
    runs-on: self-hosted

    steps:
      - name: Pull Latest Image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/bookmyflight:latest

      - name: Stop Existing Containers
        working-directory: C:\Users\ksing\OneDrive\Desktop\bookmyflight
        run: docker compose down

      - name: Start Updated Containers
        working-directory: C:\Users\ksing\OneDrive\Desktop\bookmyflight
        run: docker compose up -d --force-recreate
```
