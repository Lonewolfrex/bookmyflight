name: Build and Deploy BookMyFlight

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. Run SonarQube SAST analysis (Dockerized SonarQube server)
      - name: SonarQube Scan
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # 2. OPTIONAL: Quality Gate (if you want to fail CI on bad quality)
      # - name: SonarQube Quality Gate check
      #   uses: SonarSource/sonarqube-quality-gate-action@master
      #   timeout-minutes: 5
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
      #     SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # 3. Build and push Docker image (unchanged)
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/bookmyflight:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/bookmyflight:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/bookmyflight:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/bookmyflight:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/bookmyflight:latest

  deploy:
    needs: build
    runs-on: self-hosted

    steps:
      - name: Pull Latest Image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/bookmyflight:latest

      - name: Stop Existing Containers
        working-directory: C:\Users\ksing\OneDrive\Desktop\bookmyflight
        run: docker compose down

      - name: Start Updated Containers
        working-directory: C:\Users\ksing\OneDrive\Desktop\bookmyflight
        run: docker compose up -d --force-recreate