name: Build and Deploy BookMyFlight

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['python']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          upload: true
          output: sarif-results

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif
          path: sarif-results/*.sarif
          if-no-files-found: error

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Create CodeQL HTML Report
        run: |
          echo "Searching for SARIF files in the results directory..."

          SARIF=$(find sarif-results -name "*.sarif" | head -1)

          if [ ! -f "$SARIF" ]; then
            echo "SARIF not found in sarif-results, searching workspace..."
            SARIF=$(find ${{ github.workspace }} -name "*.sarif" | head -1)
          fi

          if [ ! -f "$SARIF" ]; then
            echo "No SARIF file found; using dummy data."
            cat > codeql-report.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <body>
            <h1>CodeQL SAST Report</h1>
            <p>No SARIF file found; see GitHub Security tab for details.</p>
          </body>
          </html>
          EOF
            exit 0
          fi

          echo "Processing $SARIF"
          RESULTS=$(jq -r '.runs[].results[]' "$SARIF" 2>/dev/null || echo "[]")

          if [ "$RESULTS" = "[]" ] || [ -z "$RESULTS" ]; then
            TOTAL=0
            HIGH=0
            MED=0
            LOW=0
          else
            TOTAL=$(echo "$RESULTS" | jq -s 'length')
            HIGH=$(echo "$RESULTS" | jq -s 'map(select(.level == "error")) | length')
            MED=$(echo "$RESULTS" | jq -s 'map(select(.level == "warning")) | length')
            LOW=$(echo "$RESULTS" | jq -s 'map(select(.level == "note")) | length')
          fi

          cat > codeql-report.html << EOF
          <!DOCTYPE html>
          <html>
          <head>
            <title>CodeQL SAST Report</title>
          </head>
          <body>
            <h1>CodeQL SAST Report</h1>
            <p>Total issues: $TOTAL</p>
            <p>High: $HIGH</p>
            <p>Medium: $MED</p>
            <p>Low: $LOW</p>
          </body>
          </html>
          EOF

      - name: Upload CodeQL HTML Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeql-report-html
          path: codeql-report.html

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: codeql

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/bookmyflight:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/bookmyflight:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/bookmyflight:latest

  trivy:
    name: Trivy Docker Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/bookmyflight:${{ github.sha }}
          format: table
          exit-code: 0
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

  push:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: trivy

    steps:
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/bookmyflight:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/bookmyflight:latest

  deploy:
    name: Deploy to Docker (Laptop1)
    needs: push
    runs-on: self-hosted

    steps:
      - name: Pull Latest Image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/bookmyflight:latest

      - name: Stop Existing Containers
        working-directory: C:\Users\ksing\OneDrive\Desktop\bookmyflight
        run: docker compose down

      - name: Start Updated Containers
        working-directory: C:\Users\ksing\OneDrive\Desktop\bookmyflight
        run: docker compose up -d --force-recreate